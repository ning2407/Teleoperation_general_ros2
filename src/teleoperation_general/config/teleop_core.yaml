teleop_manager:
  ros__parameters:
    robot_name: ""
    base_frame: base_link

    command_topic: /teleop/command
    status_topic: /teleop/status
    validated_joint_velocity_topic: /teleop/validated/joint_velocity
    validated_joint_position_topic: /teleop/validated/joint_position
    validated_cartesian_twist_topic: /servo_node/delta_twist_cmds
    validated_cartesian_pose_topic: /teleop/validated/cartesian_pose
    set_control_mode_service: /teleop/set_control_mode
    set_teleop_enable_service: /teleop/set_teleop_enable
    reset_emergency_stop_service: /teleop/reset_emergency_stop

    default_mode: cartesian_twist
    allowed_modes:
      - joint_position
      - joint_velocity
      - cartesian_pose
      - cartesian_twist
      - gripper

    control_frequency: 50.0
    command_timeout_s: 0.2
    mode_switch_debounce_s: 0.25
    transform_timeout_s: 0.05
    require_enable: true

    deadband: 0.0001
    smoothing_alpha: 0.35

    max_linear_velocity: 0.15
    max_angular_velocity: 0.4
    workspace_min: [-1.0, -1.0, 0.0]
    workspace_max: [1.0, 1.0, 1.2]

    joint_names:
      - joint_1
      - joint_2
      - joint_3
      - joint_4
      - joint_5
      - joint_6
      - joint_7
    min_joint_position: [-3.14, -2.6, -3.14, -2.8, -3.14, -2.8, -3.14]
    max_joint_position: [3.14, 2.6, 3.14, 2.8, 3.14, 2.8, 3.14]
    max_joint_velocity: [0.5, 0.5, 0.5, 0.5, 0.8, 0.8, 0.8]

keyboard_servo:
  ros__parameters:
    command_topic: /teleop/command
    robot_name: ""
    frame_id: base_link
    linear_step: 8.0
    angular_step: 5.0
    enable: true
    observation_topic: /teleop/observation
    current_pose_timeout_s: 1.0
    controller_manager_prefix: /controller_manager
    trajectory_controller: joint_trajectory_controller
    servo_controller: forward_position_controller
    switch_controller_timeout_s: 2.0
    auto_switch_for_home: true
    return_to_servo_after_home: false
    joint_state_topic: /joint_states
    servo_command_topic: /forward_position_controller/commands
    seed_servo_on_switch: true
    servo_seed_publish_count: 5
    servo_seed_publish_period_s: 0.05
    manage_servo_node_on_switch: true
    servo_node_prefix: /servo_node
    home_trajectory_action: /joint_trajectory_controller/follow_joint_trajectory
    home_joint_names:
      - shoulder_pan_joint
      - shoulder_lift_joint
      - elbow_joint
      - wrist_1_joint
      - wrist_2_joint
      - wrist_3_joint
    home_joint_positions: [-1.57, -1.57, -1.57, -1.57, 1.57, 0.0]
    home_duration_s: 3.0
    # Optional fixed home pose in frame_id.
    # home_position: [0.40, 0.00, 0.35]
    # Use either quaternion xyzw or RPY radians. home_rpy takes priority if set.
    home_orientation_xyzw: [0.0, 0.0, 0.0, 1.0]
    # home_rpy: [0.0, 0.0, 0.0]

observation_publisher:
  ros__parameters:
    robot_name: ""
    base_frame: base_link
    end_effector_frame: tool0
    joint_state_topic: /joint_states
    observation_topic: /teleop/observation
    publish_frequency: 50.0
    joint_state_timeout_s: 1.0
